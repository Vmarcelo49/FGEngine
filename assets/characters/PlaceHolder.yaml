              w: 256
              h: 256
            anchorX: 127
            anchorY: 177
        framedata:
          - duration: 1
            spriteIndex: 0
            changeXSpeed: 2
      "4":
        name: "4"
        sprites:
          - imgPath: ../common/walk.png
            rect:
              w: 256
              h: 256
            anchorX: 127
            anchorY: 177
        framedata:
          - duration: 1
            spriteIndex: 0
            changeXSpeed: -2
      "jump":
        name: "jump"
        sprites:
          - imgPath: ../common/jump.png
